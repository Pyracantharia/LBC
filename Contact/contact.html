<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Inscription</title>
    <link rel="stylesheet" href="/Contact/contact.css">
</head>
<body>
    <div class="container">
        <div id="connexion">
          <h1 class="title">De Retour !</h1>
          <p class="paragraphe">
            Veuillez entrer vos détails de connexion et démarrez votre journée sur LBC M2L
          </p>
          <a href="/Connexion/Connexion.html" class="btn-link connexion">Se connecter</a>
        </div>
        <div id="inscription">
          <h1 class="title">Créer un compte</h1>
          <p class="paragraphe">
            Veuillez remplir tous les champs *
          </p>
          <form class="formulaire">

            <div class="group-form">
              <input type="text" placeholder="Entrez votre nom complet *">
              <div class="icon-user"></div>
            </div>

            <div class="group-form">
              <input type="email" placeholder="Entrez votre mail *">
              <div class="icon-mail"></div>
            </div>

            <div class="group-form">
                <input type="text" placeholder="Entrez votre numéro ">
                <div class="icon-tel"></div>
            </div>

            <div class="group-form">
              <input type="password" placeholder="Mot de passe *">
              <div class="icon-password"></div>
            </div>

            <div class="group-form">
                <input type="password" placeholder="Confirmer votre mot de passe *">
                <div class="icon-password"></div>
              </div>

            <div class="group-form">
              <input type="submit" class="inscription" value="S'inscrire">
            </div>
          </form>
        </div>
      </div>
    
</body>
</html>
